name: 'Backup-And-Release'
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
jobs:
  "Export":
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: "Configure long path"
        run: |
          git config --system core.longpaths true
        # Der Checkout für dazu, dass der letzte Commit des Repositories runtergeladen wird.
        # https://github.com/marketplace/actions/checkout
      - name: "Setup GitHub Environment"
        uses: actions/checkout@v6
        with:
          ref: 'main'
      - name: "Export_Backup"
        continue-on-error: false
        shell: PowerShell
        run: |
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          & "${{ github.workspace }}\runtime\IntuneManagement\Start-IntuneManagement.ps1" `
            -Silent `
            -SilentBatchFile "${{ github.workspace }}\config\BulkExport.json" `
            -AppId "${{ secrets.AZURE_CLIENT_ID }}" `
            -Secret "${{ secrets.AZURE_CLIENT_SEC }}" `
            -TenantId "${{ secrets.AZURE_TENANT_ID }}"
            ``
      - name: "Commit Release Candidate"
        continue-on-error: true
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git config --system core.longpaths true
          git checkout main
          git pull
          git add .
          git status
          git commit -a -m "[create release_candidate]" || echo "No changes to commit"
      - name: "Upload Release Candidate"
        run: git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
  create_release:
    runs-on: windows-latest
    needs: "Export"
    permissions:
      contents: write
    steps:
      - name: "Configure long path"
        run: |
          git config --system core.longpaths true
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: 'main'
      - name: "Create release description"
        continue-on-error: false
        shell: "Powershell"
        run: |
          $CurrentDate = Get-date -Format FileDateTimeUniversal
          echo "releasedate=$CurrentDate" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          foreach ($item in (Get-ChildItem -Path ${{ github.workspace }}\release -recurse -filter *.json)) {
          $json = Get-Content $item.fullname | ConvertFrom-Json
          if ($json.description){
            $json.description += ('Release: ' + $CurrentDate)
            $json | ConvertTo-Json -Depth 1000 | Set-Content $item.fullname}}
      - name: Archive release folder
        run: |
          Compress-Archive -Path "${{ github.workspace }}\release\*" -DestinationPath "${{ github.workspace }}\release.zip"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.releasedate }}
          name: ${{ env.releasedate }}
          body: ${{ env.releasedate }}
          files: ${{ github.workspace }}\release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
